name: Build image for Cloud.ru

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: dobro-media

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4

      - name: Sign in to Cloud.ru Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CLOUDRU_REGISTRY }}
          username: ${{ secrets.CLOUDRU_REGISTRY_USERNAME }}
          password: ${{ secrets.CLOUDRU_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cloudru
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.CLOUDRU_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.CLOUDRU_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
